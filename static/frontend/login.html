<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录页面</title>
    <link rel="stylesheet" href="/static/frontend/login.css" />
  </head>
  <body>
    <main class="login-container">
      <h1>系统登录</h1>
      <form id="login-form" autocomplete="off">
        <label for="username">用户名</label>
        <input id="username" name="username" type="text" required />

        <label for="password">密码</label>
        <div class="password-row">
          <input id="password" name="password" type="password" required />
          <button type="button" id="toggle-password">显示</button>
        </div>

        <div class="options">
          <label><input id="remember-password" type="checkbox" /> 记住密码</label>
          <label><input id="keep-logged-in" type="checkbox" /> 保持登录（30天）</label>
        </div>

        <button class="submit" type="submit">登录</button>
        <p id="message" aria-live="polite"></p>
      </form>
    </main>

    <script src="/static/frontend/login.js"></script>
  </body>
</html>
